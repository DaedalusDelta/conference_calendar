<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Learning Deadlines</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Robot Learning Deadlines</h1>
        <p id="updated" class="meta">Loading latest deadline snapshot...</p>
      </header>

      <section class="calendar-wrap">
        <div class="calendar-head">
          <button id="prevMonth" aria-label="Previous month">←</button>
          <h2 id="calendarTitle">Calendar</h2>
          <button id="nextMonth" aria-label="Next month">→</button>
        </div>
        <div id="calendar" class="calendar"></div>
      </section>

      <section class="toolbar">
        <input id="search" type="search" placeholder="Filter conferences (e.g., ICRA, CoRL)" />
      </section>

      <section id="grid" class="grid"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
